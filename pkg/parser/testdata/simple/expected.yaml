components:
  schemas:
    github_com_odarbelaeze_test_simple_api:api.Pet3:
      properties:
        id:
          format: int32
          type: integer
      type: object
    github_com_odarbelaeze_test_simple_cross:cross.Cross:
      properties:
        Array:
          items:
            type: string
          type: array
        String:
          type: string
      type: object
externalDocs:
  description: Find more info here
  url: http://www.swagger.io/support
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a sample server Petstore server.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Swagger Example API
  version: "1.0"
jsonSchemaDialect: https://spec.openapis.org/oas/3.1/dialect/base
openapi: 3.1.1
paths:
  /AnonymousField:
    get:
      summary: use Anonymous field
  /AnonymousStructArray:
    get:
      summary: Use AnonymousStructArray
  /CrossAlias:
    get:
      summary: Use CrossAlias
  /GetPet5a:
    options:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/github_com_odarbelaeze_test_simple_api:api.Pet3'
        description: The request body
        required: true
  /GetPet5b:
    head:
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/github_com_odarbelaeze_test_simple_api:api.Pet3'
              type: array
        description: The request body
        required: true
  /GetPet5c:
    patch:
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/github_com_odarbelaeze_test_simple_cross:cross.Cross'
              type: array
        description: The request body
        required: true
  /GetPet6FunctionScopedComplexResponse:
    get: {}
  /GetPet6FunctionScopedResponse:
    get: {}
  /GetPet6MapString:
    get: {}
  /IndirectRecursiveTest:
    get:
      summary: Use IndirectRecursiveTest
  /Pet2:
    get:
      summary: use pet2
  /Tags:
    get:
      summary: Use Tags
  /file/upload:
    post:
      description: Upload file
      operationId: file.upload
      requestBody:
        content:
          application/json:
            schema:
              type: string
        description: The request body
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: The response body
      summary: Upload file
  /testapi/get-string-by-int/{some_id}:
    get:
      description: get string by ID
      operationId: get-string-by-int
      parameters:
        - description: the ID of the string to return
          in: path
          name: some_id
          required: true
          schema:
            format: int32
            type: integer
      summary: Add a new pet to the store
  /testapi/get-struct-array-by-string/{some_id}:
    get:
      description: get struct array by ID
      operationId: get-struct-array-by-string
      parameters:
        - allowReserved: true
          in: path
          name: some_id
          required: true
          schema:
            type: string
        - allowEmptyValue: true
          in: query
          name: category
          schema:
            format: int32
            type: integer
        - deprecated: true
          in: query
          name: offset
          schema:
            format: int32
            type: integer
        - in: query
          name: limit
          required: true
          schema:
            format: int32
            type: integer
        - in: query
          name: q
          schema:
            type: string
      security:
        - ApiKeyAuth:
            - scope1
            - scope2
        - BasicAuth:
            - scope1
            - scope2
        - OAuth2Application:
            - write
            - scope3
        - OAuth2Implicit:
            - read
            - admin
            - scope4
        - OAuth2AccessCode:
            - read
            - scope5
        - OAuth2Password:
            - admin
            - scope6
        - OAuth2Implicit:
            - read
            - write
            - scope7
        - Firebase:
            - scope8
servers:
  - url: https://petstore.swagger.io/v2
  - description: Production Server
    url: '{scheme}://petstore.swagger.io/v2'
    variables:
      scheme:
        default: http
        description: description
        enum:
          - http
          - https
tags:
  - description: These are some sample pets
    externalDocs:
      description: Find more info here
      url: http://swagger.io/petstore
    name: pets
  - description: These are some sample users
    name: users

