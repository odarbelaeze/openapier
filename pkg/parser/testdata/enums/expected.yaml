components:
  schemas:
    Item:
      properties:
        priority:
          $ref: '#/components/schemas/Priority'
        something:
          $ref: '#/components/schemas/Something'
        status:
          $ref: '#/components/schemas/Status'
        with_skipped:
          $ref: '#/components/schemas/WithSkipped'
      required:
        - status
        - priority
        - something
        - with_skipped
      type: object
    Paginated[Item]:
      properties:
        items:
          description: |
            Items is the list of items
          items:
            $ref: '#/components/schemas/Item'
          maxItems: 100
          type: array
        meta:
          $ref: '#/components/schemas/Pagination'
      required:
        - items
        - meta
      type: object
    Pagination:
      description: |
        Meta is the pagination metadata
      properties:
        cursor:
          description: |
            Cursor is the cursor for the next page
          type: string
        hasMore:
          description: |
            HasMore indicates if there are more pages
          type: boolean
        next:
          description: |
            Next is the URL for the next page
          format: url
          type: string
      required:
        - cursor
        - hasMore
      type: object
    Priority:
      enum:
        - 0
        - 1
        - 2
      format: int32
      type: integer
    RestError:
      properties:
        code:
          description: |
            Code is the HTTP status code
          examples:
            - 500
          format: int32
          type: integer
        message:
          description: |
            Message is the error message
          type: string
        success:
          description: |
            Success is a boolean indicating if the request was successful
          enum:
            - false
          type: boolean
      required:
        - success
        - code
        - message
      type: object
    Something:
      description: |
        Something is a thing
      enum:
        - 1
        - 2
      format: int32
      type: integer
    Status:
      enum:
        - open
        - closed
      type: string
    WithSkipped:
      description: |
        WithSkipped is a thing with skipped values
      enum:
        - 1
        - 3
      format: int32
      type: integer
info:
  description: This is a sample API that exposes types.
  termsOfService: http://swagger.io/terms/
  title: API that exposes types
  version: "1.0"
jsonSchemaDialect: https://spec.openapis.org/oas/3.1/dialect/base
openapi: 3.1.1
paths:
  /items:
    get:
      parameters:
        - description: Item status
          in: query
          name: status
          schema:
            $ref: '#/components/schemas/Status'
        - description: Item priority
          in: query
          name: priority
          schema:
            $ref: '#/components/schemas/Priority'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Paginated[Item]'
          description: Paginated list of items
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestError'
          description: Internal server error
      summary: List items

