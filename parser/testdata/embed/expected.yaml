components:
  schemas:
    Base:
      properties:
        created_at:
          type: string
        id:
          format: uuid
          type: string
        updated_at:
          type: string
      required:
        - id
        - created_at
        - updated_at
      type: object
    User:
      allOf:
        - $ref: '#/components/schemas/Base'
        - properties:
            email:
              type: string
            name:
              type: string
          required:
            - name
            - email
          type: object
info:
  description: This demonstrates embedding.
  termsOfService: http://swagger.io/terms/
  title: API that exposes types
  version: "1.0"
jsonSchemaDialect: https://spec.openapis.org/oas/3.1/dialect/base
openapi: 3.1.1
paths:
  /user/{id}:
    get:
      parameters:
        - description: User ID
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: The user with the given ID
      summary: Get a user by ID

